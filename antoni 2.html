<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #16a34a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .registro-contenedor {
            width: 380px;
            background-color: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .registro-contenedor h1 {
            margin-bottom: 10px;
            color: #15803d;
        }

        .registro-contenedor p {
            color: #555;
            margin-bottom: 25px;
        }

        .campo {
            text-align: left;
            margin-bottom: 16px;
        }

        .campo label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        .campo input {
            width: 100%;
            padding: 12px;
            border: 1px solid #bbb;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .campo input:focus {
            outline: none;
            border-color: #16a34a;
            box-shadow: 0 0 5px rgba(22, 163, 74, 0.4);
        }

        .terminos {
            text-align: left;
            font-size: 14px;
            margin-bottom: 20px;
            color: #444;
        }

        .terminos a {
            color: #16a34a;
            text-decoration: none;
            font-weight: bold;
        }

        .terminos a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            background-color: #15803d;
            color: white;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #166534;
        }

        .login {
            margin-top: 20px;
            font-size: 14px;
        }

        .login a {
            color: #16a34a;
            font-weight: bold;
            text-decoration: none;
        }

        .login a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="registro-contenedor">
        <h1>Crear Cuenta</h1>
        <p>Completa tus datos para registrarte</p>

        <form>
